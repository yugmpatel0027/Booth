<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Frontier Bakery — Quick Connect</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #F8F7F4; color: #2D2D2D; min-height: 100vh; }

  .header { background: #006058; padding: 24px; text-align: center; }
  .header h1 { color: #F2C800; font-size: 22px; font-weight: 700; }
  .header p { color: #F8F7F4; font-size: 13px; margin-top: 4px; opacity: 0.85; }

  .container { padding: 24px 20px; max-width: 400px; margin: 0 auto; text-align: center; }
  .intro { font-size: 15px; color: #006058; font-weight: 600; margin-bottom: 4px; }
  .intro-sub { font-size: 13px; color: #666; margin-bottom: 24px; }

  .lang-row { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 20px; }
  .lang-btn {
    padding: 4px 10px; border: 2px solid #006058; border-radius: 16px;
    background: transparent; color: #006058; font-size: 11px; font-weight: 600; cursor: pointer;
  }
  .lang-btn.active { background: #006058; color: #F8F7F4; }

  .field { margin-bottom: 14px; text-align: left; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: #006058; margin-bottom: 4px; }
  .field label::after { content: ' *'; color: #D4231A; }
  .field input {
    width: 100%; padding: 12px 14px; border: 1.5px solid #ddd; border-radius: 8px;
    font-size: 16px; font-family: 'Inter', sans-serif; background: #fff;
    -webkit-appearance: none;
  }
  .field input:focus { outline: none; border-color: #006058; box-shadow: 0 0 0 3px rgba(0,96,88,0.1); }

  .submit-btn {
    width: 100%; padding: 14px; background: #006058; color: #F2C800; border: none;
    border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 4px;
  }

  .success { display: none; text-align: center; padding: 40px 20px; }
  .success .check {
    width: 60px; height: 60px; background: #006058; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px; font-size: 28px; color: #F2C800;
  }
  .success h2 { color: #006058; font-size: 20px; margin-bottom: 8px; }
  .success p { color: #666; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <h1>FRONTIER BAKERY</h1>
  <p>Alimentaria 2026 — Pavilion 7, Stand E41</p>
</div>

<div class="container" id="formSection">
  <p class="intro" id="introText">Stay Connected</p>
  <p class="intro-sub" id="introSub">Leave your details and we'll send you our product catalog</p>

  <div class="lang-row" id="langRow">
    <button class="lang-btn active" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="es">ES</button>
    <button class="lang-btn" data-lang="fr">FR</button>
    <button class="lang-btn" data-lang="de">DE</button>
  </div>

  <form onsubmit="return submitQuick(event)">
    <div class="field">
      <label id="lbl-n">Name</label>
      <input type="text" id="qName" required placeholder="Your name" autocomplete="name">
    </div>
    <div class="field">
      <label id="lbl-e">Email</label>
      <input type="email" id="qEmail" required placeholder="name@company.com" autocomplete="email">
    </div>
    <div class="field">
      <label id="lbl-p">Phone</label>
      <input type="tel" id="qPhone" required placeholder="+34 600 000 000" autocomplete="tel">
    </div>
    <div class="field">
      <label id="lbl-c">Company</label>
      <input type="text" id="qCompany" placeholder="Company name" autocomplete="organization">
    </div>
    <button type="submit" class="submit-btn" id="btnSub">Connect</button>
  </form>
</div>

<div class="success" id="successSection">
  <div class="check">✓</div>
  <h2 id="msgThanks">Thank You!</h2>
  <p id="msgSub">We'll be in touch with our product catalog.</p>
</div>

<script>
  const QL = {
    en: { intro: 'Stay Connected', sub: "Leave your details and we'll send you our product catalog", name: 'Name', email: 'Email', phone: 'Phone', company: 'Company', btn: 'Connect', thanks: 'Thank You!', msg: "We'll be in touch with our product catalog.", ph_n: 'Your name', ph_c: 'Company name' },
    es: { intro: 'Mantente Conectado', sub: 'Déjanos tus datos y te enviaremos nuestro catálogo', name: 'Nombre', email: 'Correo', phone: 'Teléfono', company: 'Empresa', btn: 'Conectar', thanks: '¡Gracias!', msg: 'Te enviaremos nuestro catálogo de productos.', ph_n: 'Tu nombre', ph_c: 'Nombre de empresa' },
    fr: { intro: 'Restons Connectés', sub: 'Laissez vos coordonnées et nous vous enverrons notre catalogue', name: 'Nom', email: 'Email', phone: 'Téléphone', company: 'Entreprise', btn: 'Connecter', thanks: 'Merci !', msg: 'Nous vous enverrons notre catalogue produits.', ph_n: 'Votre nom', ph_c: "Nom d'entreprise" },
    de: { intro: 'Bleiben Sie Verbunden', sub: 'Hinterlassen Sie Ihre Daten und wir senden Ihnen unseren Katalog', name: 'Name', email: 'E-Mail', phone: 'Telefon', company: 'Unternehmen', btn: 'Verbinden', thanks: 'Vielen Dank!', msg: 'Wir senden Ihnen unseren Produktkatalog.', ph_n: 'Ihr Name', ph_c: 'Firmenname' },
  };

  let qLang = 'en';

  // Google Sheet backend — same URL as main form
  const SHEET_URL = localStorage.getItem('frontier_sheet_url') || 'https://script.google.com/macros/s/AKfycbzkS44zKtNL7UizVrHhjSTul4Qg3ziqppJ1obcwxe-uGnHTDLaKy4bhM4xpSiyGNB-Mjw/exec';
  function postToSheet(data) {
    if (!SHEET_URL) return;
    fetch(SHEET_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    }).catch(err => console.log('Sheet sync failed:', err));
  }

  document.getElementById('langRow').addEventListener('click', function(e) {
    const btn = e.target.closest('.lang-btn');
    if (!btn) return;
    qLang = btn.dataset.lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === qLang));
    const t = QL[qLang] || QL.en;
    document.getElementById('introText').textContent = t.intro;
    document.getElementById('introSub').textContent = t.sub;
    document.getElementById('lbl-n').textContent = t.name;
    document.getElementById('lbl-e').textContent = t.email;
    document.getElementById('lbl-p').textContent = t.phone;
    document.getElementById('lbl-c').textContent = t.company;
    document.getElementById('btnSub').textContent = t.btn;
    document.getElementById('qName').placeholder = t.ph_n;
    document.getElementById('qCompany').placeholder = t.ph_c;
  });

  function submitQuick(e) {
    e.preventDefault();
    const lead = {
      timestamp: new Date().toISOString(),
      name: document.getElementById('qName').value.trim(),
      email: document.getElementById('qEmail').value.trim(),
      phone: document.getElementById('qPhone').value.trim(),
      company: document.getElementById('qCompany').value.trim(),
      source: 'qr-passby',
      language: qLang
    };

    // Save to same localStorage as main lead form
    let leads = [];
    try { leads = JSON.parse(localStorage.getItem('frontier_leads') || '[]'); } catch(e) {}
    leads.push(lead);
    localStorage.setItem('frontier_leads', JSON.stringify(leads));

    // Also send to Google Sheet if configured
    postToSheet(lead);

    const t = QL[qLang] || QL.en;
    document.getElementById('msgThanks').textContent = t.thanks;
    document.getElementById('msgSub').textContent = t.msg;
    document.getElementById('formSection').style.display = 'none';
    document.getElementById('successSection').style.display = 'block';

    // Auto-reset after 4 seconds for next person
    setTimeout(function() {
      document.querySelector('form').reset();
      document.getElementById('formSection').style.display = 'block';
      document.getElementById('successSection').style.display = 'none';
    }, 4000);
  }
</script>
</body>
</html>
