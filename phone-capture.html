<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Frontier Bakery — Lead Capture</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:#F8F7F4;color:#2D2D2D;min-height:100vh}
  .header{background:#006058;padding:20px 24px;text-align:center}
  .header h1{color:#F2C800;font-size:20px;font-weight:700}
  .header p{color:#F8F7F4;font-size:12px;margin-top:4px;opacity:.85}
  .container{padding:16px 20px 40px;max-width:480px;margin:0 auto}
  .mode-toggle{display:flex;gap:8px;margin-bottom:16px}
  .mode-btn{flex:1;padding:10px;border:2px solid #006058;border-radius:8px;background:transparent;color:#006058;font-size:13px;font-weight:600;cursor:pointer}
  .mode-btn.active{background:#006058;color:#F8F7F4}
  .section{display:none}.section.active{display:block}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;font-weight:600;color:#006058;margin-bottom:4px}
  .field label .req{color:#D4231A}
  .field input,.field textarea,.field select{width:100%;padding:11px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:16px;font-family:'Inter',sans-serif;background:#fff;-webkit-appearance:none}
  .field input:focus,.field textarea:focus{outline:none;border-color:#006058;box-shadow:0 0 0 3px rgba(0,96,88,.1)}
  .field textarea{height:70px;resize:vertical}
  .camera-area{margin-bottom:16px}
  .camera-btn{width:100%;padding:14px;background:#F2C800;color:#2D2D2D;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  .camera-btn.secondary{background:transparent;border:2px solid #006058;color:#006058;font-size:13px;padding:10px;margin-top:8px}
  .preview-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .preview-img{width:72px;height:72px;object-fit:cover;border-radius:6px;border:2px solid #006058}
  .submit-btn{width:100%;padding:14px;background:#006058;color:#F2C800;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}
  .submit-btn:disabled{opacity:.5}
  .success{display:none;text-align:center;padding:40px 20px}
  .success .check{width:60px;height:60px;background:#006058;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px;color:#F2C800}
  .success h2{color:#006058;font-size:20px;margin-bottom:8px}
  .success p{color:#666;font-size:14px;margin-bottom:20px}
  .reset-btn{padding:12px 32px;background:transparent;color:#006058;border:2px solid #006058;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
  .counter{text-align:center;padding:8px;background:#006058;color:#F2C800;font-size:13px;font-weight:600}
  .rating-row{display:flex;gap:8px;margin-bottom:12px}
  .rate-btn{flex:1;padding:10px;border:2px solid #ddd;border-radius:8px;background:#fff;font-size:13px;font-weight:600;cursor:pointer;text-align:center}
  .rate-btn.hot{border-color:#D4231A;color:#D4231A}
  .rate-btn.warm{border-color:#F2C800;color:#996600}
  .rate-btn.cold{border-color:#006058;color:#006058}
  .rate-btn.selected{color:#fff}
  .rate-btn.hot.selected{background:#D4231A}
  .rate-btn.warm.selected{background:#F2C800;color:#2D2D2D}
  .rate-btn.cold.selected{background:#006058}
</style>
</head>
<body>

<div class="header">
  <h1>FRONTIER BAKERY</h1>
  <p>Alimentaria 2026 — Lead Capture</p>
</div>

<div id="counterBar" class="counter" style="display:none">Leads captured: <span id="leadCount">0</span></div>

<div class="container" id="formSection">
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('quick')">Quick Snap</button>
    <button class="mode-btn" onclick="setMode('full')">Full Entry</button>
    <button class="mode-btn" onclick="setMode('photo')">Photos Only</button>
  </div>

  <!-- QUICK SNAP MODE: Camera first, then minimal info -->
  <div class="section active" id="quickSection">
    <div class="camera-area">
      <button class="camera-btn" onclick="takePhoto('quick')">📸 Snap Business Card</button>
      <div class="preview-grid" id="quickPreview"></div>
    </div>
    <div class="field">
      <label>Name <span class="req">*</span></label>
      <input type="text" id="qName" placeholder="From card or type" autocomplete="name">
    </div>
    <div class="field">
      <label>Company</label>
      <input type="text" id="qCompany" placeholder="Company name" autocomplete="organization">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="qEmail" placeholder="name@company.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Phone</label>
      <input type="tel" id="qPhone" placeholder="+34 600 000 000" autocomplete="tel">
    </div>
    <div class="rating-row">
      <button class="rate-btn hot" onclick="setRating('hot',this)">🔥 Hot</button>
      <button class="rate-btn warm" onclick="setRating('warm',this)">☀️ Warm</button>
      <button class="rate-btn cold" onclick="setRating('cold',this)">❄️ Cold</button>
    </div>
    <div class="field">
      <label>Quick Note</label>
      <textarea id="qNotes" placeholder="Key details, what they want, follow-up needed..."></textarea>
    </div>
    <button class="submit-btn" onclick="submitLead('quick')">Save Lead</button>
  </div>

  <!-- FULL ENTRY MODE -->
  <div class="section" id="fullSection">
    <div class="camera-area">
      <button class="camera-btn" onclick="takePhoto('full')">📸 Snap Business Card</button>
      <button class="camera-btn secondary" onclick="uploadPhoto('full')">📁 Upload Photo</button>
      <div class="preview-grid" id="fullPreview"></div>
    </div>
    <div class="field">
      <label>Name <span class="req">*</span></label>
      <input type="text" id="fName" autocomplete="name">
    </div>
    <div class="field">
      <label>Company <span class="req">*</span></label>
      <input type="text" id="fCompany" autocomplete="organization">
    </div>
    <div class="field">
      <label>Role</label>
      <input type="text" id="fRole" placeholder="Category Manager, Buyer...">
    </div>
    <div class="field">
      <label>Email <span class="req">*</span></label>
      <input type="email" id="fEmail" autocomplete="email">
    </div>
    <div class="field">
      <label>Phone <span class="req">*</span></label>
      <input type="tel" id="fPhone" autocomplete="tel">
    </div>
    <div class="field">
      <label>Country</label>
      <select id="fCountry">
        <option value="">Select...</option>
        <option>Spain</option><option>France</option><option>Germany</option>
        <option>Italy</option><option>Portugal</option><option>Netherlands</option>
        <option>Belgium</option><option>UK</option><option>USA</option>
        <option>Canada</option><option>Other</option>
      </select>
    </div>
    <div class="field">
      <label>Company Type</label>
      <select id="fType">
        <option value="">Select...</option>
        <option>Retailer</option><option>Distributor</option><option>Wholesaler</option>
        <option>Food Service</option><option>Manufacturer</option><option>Broker</option>
        <option>Other</option>
      </select>
    </div>
    <div class="field">
      <label>Products of Interest</label>
      <input type="text" id="fProducts" placeholder="Naan, Pita, Roti...">
    </div>
    <div class="rating-row">
      <button class="rate-btn hot" onclick="setRating('hot',this)">🔥 Hot</button>
      <button class="rate-btn warm" onclick="setRating('warm',this)">☀️ Warm</button>
      <button class="rate-btn cold" onclick="setRating('cold',this)">❄️ Cold</button>
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="fNotes" placeholder="Conversation details, next steps..."></textarea>
    </div>
    <button class="submit-btn" onclick="submitLead('full')">Save Lead</button>
  </div>

  <!-- PHOTO ONLY MODE: batch upload booth photos -->
  <div class="section" id="photoSection">
    <p style="font-size:14px;color:#006058;font-weight:600;margin-bottom:12px;text-align:center">Upload booth photos, product shots, or anything from the show</p>
    <div class="camera-area">
      <button class="camera-btn" onclick="takePhoto('batch')">📸 Take Photo</button>
      <button class="camera-btn secondary" onclick="uploadPhoto('batch')">📁 Upload from Gallery</button>
      <div class="preview-grid" id="batchPreview"></div>
    </div>
    <div class="field">
      <label>Caption / Description</label>
      <textarea id="batchCaption" placeholder="What's in these photos?"></textarea>
    </div>
    <button class="submit-btn" onclick="submitPhotos()">Save Photos</button>
  </div>
</div>

<div class="success" id="successSection">
  <div class="check">✓</div>
  <h2>Saved!</h2>
  <p id="successMsg">Lead captured and synced to Google Sheet.</p>
  <button class="reset-btn" onclick="resetForm()">Next Lead</button>
</div>

<!-- Hidden file inputs -->
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
<input type="file" id="galleryInput" accept="image/*" multiple style="display:none">

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzkS44zKtNL7UizVrHhjSTul4Qg3ziqppJ1obcwxe-uGnHTDLaKy4bhM4xpSiyGNB-Mjw/exec';

let currentMode = 'quick';
let currentRating = '';
let photoTarget = '';
let photos = { quick: [], full: [], batch: [] };
let leadCount = parseInt(localStorage.getItem('frontier_phone_count') || '0');

updateCounter();

function updateCounter() {
  if (leadCount > 0) {
    document.getElementById('counterBar').style.display = 'block';
    document.getElementById('leadCount').textContent = leadCount;
  }
}

function setMode(mode) {
  currentMode = mode;
  currentRating = '';
  document.querySelectorAll('.mode-btn').forEach((b, i) => {
    b.classList.toggle('active', ['quick','full','photo'][i] === mode);
  });
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(mode === 'photo' ? 'photoSection' : mode + 'Section').classList.add('active');
}

function setRating(rating, btn) {
  currentRating = rating;
  btn.closest('.rating-row').querySelectorAll('.rate-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

// CAMERA & PHOTO
function takePhoto(target) {
  photoTarget = target;
  document.getElementById('cameraInput').click();
}

function uploadPhoto(target) {
  photoTarget = target;
  document.getElementById('galleryInput').click();
}

document.getElementById('cameraInput').addEventListener('change', handlePhoto);
document.getElementById('galleryInput').addEventListener('change', handlePhoto);

function handlePhoto(e) {
  const files = e.target.files;
  if (!files.length) return;
  for (const file of files) {
    const reader = new FileReader();
    reader.onload = function(ev) {
      photos[photoTarget].push(ev.target.result);
      renderPreviews(photoTarget);
    };
    reader.readAsDataURL(file);
  }
  e.target.value = '';
}

function renderPreviews(target) {
  const container = document.getElementById(target + 'Preview');
  container.innerHTML = photos[target].map((p, i) =>
    '<img class="preview-img" src="' + p + '" onclick="removePhoto(\'' + target + '\',' + i + ')">'
  ).join('');
}

function removePhoto(target, index) {
  photos[target].splice(index, 1);
  renderPreviews(target);
}

// SUBMIT
function submitLead(mode) {
  const prefix = mode === 'quick' ? 'q' : 'f';
  const name = document.getElementById(prefix + 'Name').value.trim();
  if (!name) { alert('Name is required'); return; }

  const lead = {
    timestamp: new Date().toISOString(),
    name: name,
    company: document.getElementById(prefix + 'Company')?.value.trim() || '',
    role: document.getElementById(prefix + 'Role')?.value.trim() || '',
    email: document.getElementById(prefix + 'Email')?.value.trim() || '',
    phone: document.getElementById(prefix + 'Phone')?.value.trim() || '',
    country: document.getElementById(prefix + 'Country')?.value || '',
    companyType: document.getElementById(prefix + 'Type')?.value || '',
    products: document.getElementById(prefix + 'Products')?.value.trim() || '',
    notes: document.getElementById(prefix + 'Notes')?.value.trim() || '',
    rating: currentRating,
    source: 'phone-' + mode,
    hasPhoto: photos[mode].length > 0 ? 'Yes (' + photos[mode].length + ')' : 'No'
  };

  // Save to localStorage as backup
  let leads = [];
  try { leads = JSON.parse(localStorage.getItem('frontier_phone_leads') || '[]'); } catch(e) {}
  leads.push(lead);
  localStorage.setItem('frontier_phone_leads', JSON.stringify(leads));

  // Post to Google Sheet
  fetch(SHEET_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(lead)
  }).catch(() => {});

  leadCount++;
  localStorage.setItem('frontier_phone_count', leadCount);
  updateCounter();

  // Save photos to localStorage (separate key to avoid size limits)
  if (photos[mode].length > 0) {
    let allPhotos = [];
    try { allPhotos = JSON.parse(localStorage.getItem('frontier_phone_photos') || '[]'); } catch(e) {}
    allPhotos.push({ leadName: lead.name, company: lead.company, timestamp: lead.timestamp, photos: photos[mode] });
    try { localStorage.setItem('frontier_phone_photos', JSON.stringify(allPhotos)); } catch(e) { /* storage full */ }
  }

  showSuccess('Lead saved! ' + (navigator.onLine ? 'Synced to Sheet.' : 'Will sync when online.'));
}

function submitPhotos() {
  if (photos.batch.length === 0) { alert('Take or upload at least one photo'); return; }
  const caption = document.getElementById('batchCaption').value.trim();

  const data = {
    timestamp: new Date().toISOString(),
    name: 'BOOTH PHOTOS',
    notes: caption || 'Batch photos from show',
    source: 'phone-photos',
    hasPhoto: 'Yes (' + photos.batch.length + ')'
  };

  fetch(SHEET_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).catch(() => {});

  // Save photos locally
  let allPhotos = [];
  try { allPhotos = JSON.parse(localStorage.getItem('frontier_phone_photos') || '[]'); } catch(e) {}
  allPhotos.push({ leadName: 'BOOTH PHOTOS', timestamp: data.timestamp, caption: caption, photos: photos.batch });
  try { localStorage.setItem('frontier_phone_photos', JSON.stringify(allPhotos)); } catch(e) {}

  showSuccess('Photos saved!');
}

function showSuccess(msg) {
  document.getElementById('successMsg').textContent = msg;
  document.getElementById('formSection').style.display = 'none';
  document.getElementById('successSection').style.display = 'block';
}

function resetForm() {
  document.getElementById('formSection').style.display = 'block';
  document.getElementById('successSection').style.display = 'none';
  // Clear form fields
  document.querySelectorAll('input[type="text"],input[type="email"],input[type="tel"],textarea,select').forEach(el => {
    if (el.tagName === 'SELECT') el.selectedIndex = 0;
    else el.value = '';
  });
  currentRating = '';
  photos = { quick: [], full: [], batch: [] };
  document.querySelectorAll('.preview-grid').forEach(g => g.innerHTML = '');
  document.querySelectorAll('.rate-btn').forEach(b => b.classList.remove('selected'));
}
</script>
</body>
</html>
